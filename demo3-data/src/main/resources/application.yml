# =============================================================
# demo3-data：Spring Boot 配置文件
# =============================================================
# 对比传统 Spring MVC：
#   以前分散在 web.xml、applicationContext.xml、spring-mvc.xml、
#   mybatis-config.xml... 现在一个 YAML 文件全搞定
# =============================================================

server:
  port: 8080

spring:
  application:
    name: demo3-data

  # ===== H2 内存数据库（零安装，演示用） =====
  # 换成 MySQL？改下面 3 行 + 换一个驱动依赖，代码一行不动
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:demo3;MODE=MYSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # H2 Web 控制台：http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # 启动时自动执行 SQL 脚本（建表 + 插测试数据）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

# ===== MyBatis Plus 配置 =====
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 打印到控制台
  global-config:
    db-config:
      logic-delete-field: deleted     # 逻辑删除字段
      logic-delete-value: 1           # 已删除
      logic-not-delete-value: 0       # 未删除
      id-type: auto                   # 主键自增

